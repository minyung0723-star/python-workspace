<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상품</title>
    <style>
        body{
            max-width: 600px;
            margin: 50px auto;
        }

        h1{
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .상품카드{
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px 16px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    {% for 상품 in 상품들 %}
    <div class="상품카드">
      <p>{{ 상품.name }}</p>
      <p>{{ 상품.price }} 원</p>
      <a href="/상품/{{상품.id}}">상세보기</a>
    </div>
    {% endfor %}
</body>
</html>
