<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상세</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 50px auto;
        }
        .카드 {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>상품 상세정보</h1>
    <div class="카드">
      <p>상품명 : {{ 상품.name }}</p>
      <p>가격 : {{ 상품.price }} 원</p>
      <p>재고 : {{ 상품.stock }} 개</p>
      <p>등록일 : {{ 상품.created_at }}</p>
    </div>
    <a href="/">← 목록으로</a>
    </body>
</html>
